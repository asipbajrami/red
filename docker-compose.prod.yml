services:
  frontend:
    build:
      context: ./apps/red-front
      dockerfile: Dockerfile
      target: prod
    ports:
      - "3000:3000"
    env_file:
      - ./envs/frontend.env.prod
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - red

  backend:
    build:
      context: ./apps/red-back
      dockerfile: Dockerfile
      target: prod
    expose:
      - "8000"
    env_file:
      - ./envs/.env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - red

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - red

  db:
    image: postgres:18-alpine
    expose:
      - "5432"
    env_file:
      - ./envs/.env.prod
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - red

volumes:
  pgdata:

networks:
  red:
    driver: bridge
