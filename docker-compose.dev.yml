services:
  frontend:
    build:
      context: ./apps/red-front
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/red-front:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./envs/frontend.env.dev
    depends_on:
      - backend
    networks:
      - red

  backend:
    build:
      context: ./apps/red-back
      dockerfile: Dockerfile
      target: dev
    command:
      - /bin/sh
      - -lc
      - |
        composer install --no-interaction --prefer-dist
        php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/red-back:/var/www
      - /var/www/vendor
    env_file:
      - ./envs/.env.dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - ./apps/red-back:/var/www
    depends_on:
      - backend
    networks:
      - red

  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./envs/.env.dev
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - red

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - red

volumes:
  pgdata:

networks:
  red:
    driver: bridge
